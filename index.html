<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Шашки Online</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Шашки Онлайн</h1>
        
        <!-- Настройки игры -->
        <div class="settings">
            <div class="setting-group">
                <label>Режим шашек:</label>
                <select id="gameMode">
                    <option value="russian">Русские</option>
                    <option value="turkish">Турецкие</option>
                </select>
            </div>
            
            <div class="setting-group" id="difficultyGroup">
                <label>Сложность бота:</label>
                <select id="difficulty">
                    <option value="easy">Легко</option>
                    <option value="medium" selected>Средне</option>
                    <option value="hard">Сложно</option>
                </select>
            </div>
            
            <div class="setting-group">
                <label>Тип игры:</label>
                <select id="gameType">
                    <option value="bot">Против бота</option>
                    <option value="local">Два игрока</option>
                    <option value="online">Онлайн</option>
                </select>
            </div>
        </div>
        
        <!-- Сетевая панель -->
        <div id="networkPanel" class="network-panel hidden">
            <div class="network-buttons">
                <button id="createGameBtn" class="btn-primary">Создать игру</button>
                <button id="joinGameBtn" class="btn-secondary">Подключиться</button>
            </div>
            
            <div id="createGamePanel" class="network-panel-content hidden">
                <p>Ваш ID для подключения:</p>
                <div class="peer-id-container">
                    <code id="myPeerId" class="peer-id"></code>
                    <button id="copyIdBtn" class="btn-small">Копировать</button>
                </div>
                <p class="info-text">Отправьте этот ID другу и ждите подключения...</p>
                <div id="waitingStatus" class="status waiting">Ожидание подключения...</div>
            </div>
            
            <div id="joinGamePanel" class="network-panel-content hidden">
                <p>Введите ID соперника:</p>
                <input type="text" id="remotePeerId" class="peer-input" placeholder="Введите ID">
                <button id="connectBtn" class="btn-primary">Подключиться</button>
            </div>
            
            <div id="connectionStatus" class="connection-status"></div>
        </div>
        
        <!-- Игровая информация -->
        <div class="game-info">
            <div class="score">
                <span>⚪ Белые: <span id="whiteScore">12</span></span>
                <span>⚫ Черные: <span id="blackScore">12</span></span>
            </div>
            <div class="turn-indicator">
                <div id="turnColor" class="turn-dot white"></div>
                <span id="turnText">Ход белых</span>
            </div>
        </div>
        
        <!-- Игровое поле -->
        <div class="board-wrapper">
            <div id="board" class="board"></div>
        </div>
        
        <div class="game-buttons">
            <button id="resetBtn" class="btn-secondary">Новая игра</button>
            <button id="disconnectBtn" class="btn-danger hidden">Отключиться</button>
        </div>
    </div>
    
    <!-- Модальное окно -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modalTitle">Игра окончена</h2>
            <p id="modalMessage"></p>
            <button id="modalCloseBtn" class="btn-primary">Закрыть</button>
        </div>
    </div>
    
    <script src="game.js"></script>
    <script src="network.js"></script>
    <script src="main.js"></script>
</body>
</html>
