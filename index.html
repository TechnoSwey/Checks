<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Шашки Online (PeerJS)</title>
    <!-- Подключаем PeerJS через CDN -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #ecf0f1;
            user-select: none;
            overflow: hidden;
        }

        .game-wrapper {
            background: #34495e;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            margin: 0 0 15px 0;
            font-size: 1.8rem;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            width: 100%;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-direction: column;
        }

        .control-group label {
            font-size: 0.8rem;
            color: #bdc3c7;
        }

        select, input {
            padding: 8px;
            border-radius: 6px;
            border: none;
            background: #ecf0f1;
            color: #2c3e50;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            background: #e74c3c;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        button:hover {
            background: #c0392b;
        }

        button:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
        }

        button.active {
            background: #27ae60;
        }

        .network-panel {
            background: #2c3e50;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 15px;
            border: 1px solid #465a6e;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 10px;
            align-items: center;
        }

        .status-text {
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .turn-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .board-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border: 8px solid #5d4037;
            border-radius: 4px;
            background: #5d4037;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            height: 100%;
        }

        .cell {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .cell.light {
            background-color: #f0d9b5;
        }

        .cell.dark {
            background-color: #b58863;
        }

        .cell.highlight::after {
            content: '';
            position: absolute;
            width: 30%;
            height: 30%;
            background: rgba(46, 204, 113, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.8);
            cursor: pointer;
            z-index: 5;
        }

        .cell.highlight.king-move::after {
            width: 20%;
            height: 20%;
            background: rgba(39, 174, 96, 0.6);
        }

        .piece {
            width: 85%;
            height: 85%;
            border-radius: 50%;
            position: relative;
            z-index: 2;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 5px rgba(0, 0, 0, 0.4), inset 0 -5px 5px rgba(0, 0, 0, 0.2), inset 0 5px 5px rgba(255, 255, 255, 0.3);
        }

        .piece.white {
            background: radial-gradient(circle at 35% 35%, #fff, #bdc3c7);
            border: 1px solid #95a5a6;
        }

        .piece.black {
            background: radial-gradient(circle at 35% 35%, #555, #000);
            border: 1px solid #000;
        }

        .piece.king::before {
            content: '♔';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -55%);
            font-size: 2rem;
            color: gold;
            text-shadow: 0 2px 2px rgba(0, 0, 0, 0.8);
        }

        .piece.selected {
            transform: scale(1.15);
            box-shadow: 0 0 15px #f1c40f;
            z-index: 10;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(3px);
        }

        .modal {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 300px;
        }

        @keyframes popIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .score-box {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #bdc3c7;
            font-weight: bold;
        }

        .connection-status {
            font-size: 0.8rem;
            margin-top: 5px;
            text-align: center;
            height: 1.2em;
        }

        .status-connected {
            color: #2ecc71;
        }

        .status-disconnected {
            color: #e74c3c;
        }

        .status-waiting {
            color: #f1c40f;
        }

        .bot-controls, .pvp-local-controls {
            display: block;
        }

        .mode-online .bot-controls, .mode-online .pvp-local-controls {
            display: none;
        }

        .mode-pvp .bot-controls, .mode-pvp .online-controls {
            display: none;
        }

        .mode-pve .online-controls, .mode-pve .pvp-local-controls {
            display: none;
        }
    </style>
</head>
<body>
<div class="game-wrapper" id="gameWrapper">
    <h1 id="gameTitle">Шашки Pro</h1>
    <div class="controls">
        <div class="control-group">
            <label>Режим:</label>
            <select id="gameMode" onchange="game.reset()">
                <option value="russian">Русские</option>
                <option value="turkish">Турецкие</option>
            </select>
        </div>
        <div class="control-group bot-controls">
            <label>Сложность:</label>
            <select id="difficulty">
                <option value="easy">Легко</option>
                <option value="medium" selected>Средне</option>
                <option value="hard">Сложно</option>
            </select>
        </div>
        <div class="control-group">
            <label>Тип игры:</label>
            <select id="playType" onchange="game.setPlayType(this.value)">
                <option value="pve">vs Бот</option>
                <option value="pvp">2 Игрока (Локально)</option>
                <option value="online">Онлайн (Wi-Fi)</option>
            </select>
        </div>
    </div>
    <!-- Панель сетевого подключения -->
    <div class="network-panel online-controls" id="networkPanel" style="display:none;">
        <div style="display:flex; gap:5px; margin-bottom:5px;">
            <button id="btnHost" onclick="network.hostGame()" style="flex:1;">Создать игру</button>
            <button id="btnJoin" onclick="network.joinGame()" style="flex:1;">Подключиться</button>
        </div>
        <div id="hostInfo" style="display:none; margin-top:5px; font-size:0.9rem; background:#34495e; padding:5px; border-radius:4px;">
            Ваш ID: <span id="myPeerId" style="color:#f1c40f; user-select:text; font-weight:bold;"></span>
            <button onclick="navigator.clipboard.writeText(document.getElementById('myPeerId').innerText)"
                    style="padding:2px 5px; font-size:0.7rem; width:auto; margin-top:2px;">Копировать
            </button>
            <div style="margin-top:5px; color:#bdc3c7;">Отправьте этот ID другу. Ожидайте подключения...</div>
        </div>
        <div id="joinInput" style="display:none; margin-top:5px;">
            <input type="text" id="remotePeerId" placeholder="Вставьте ID друга сюда">
            <button onclick="network.connectToPeer()" style="margin-top:5px;">Подключиться</button>
        </div>
        <div id="connectionStatus" class="connection-status"></div>
    </div>
    <div class="score-box">
        <span>Белые: <span id="scoreW">16</span></span>
        <span>Черные: <span id="scoreB">16</span></span>
    </div>
    <div class="status-bar">
        <div class="status-text">
            <span id="turnDot" class="turn-dot" style="background: white; border: 1px solid #ccc;"></span>
            <span id="statusText">Ваш ход</span>
        </div>
    </div>
    <div class="board-container" id="boardContainer">
        <div class="board" id="board"></div>
    </div>
    <button onclick="game.reset()" style="margin-top:15px; width:auto;">Рестарт</button>
</div>
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2 id="modalTitle" style="margin-top:0;">Победа!</h2>
        <p id="modalMsg">Вы выиграли партию.</p>
        <button onclick="game.reset(); network.disconnect();">Меню</button>
    </div>
</div>

<script>
    const CONSTANTS = {
        EMPTY: 0,
        WHITE: 1,
        BLACK: 2,
        WHITE_KING: 3,
        BLACK_KING: 4
    };

    // --- СЕТЕВОЙ МЕНЕДЖЕР (PeerJS) ---
    class NetworkManager {
        constructor(game) {
            this.game = game;
            this.peer = null;
            this.conn = null;
            this.myColor = null;
            this.isHost = false;
            this.gameStarted = false;
        }

        init() {
            this.peer = new Peer(null, {debug: 2});
            this.peer.on('open', (id) => {
                console.log('My peer ID is: ' + id);
            });
            this.peer.on('connection', (conn) => {
                if (this.conn) {
                    conn.close();
                    return;
                }
                this.conn = conn;
                this.setupConnection();
                this.isHost = true;
                this.myColor = 'white';
                this.updateStatus("Игрок подключился! Игра начинается.", "connected");
                this.game.startOnlineGame('white');
                this.gameStarted = true;
            });
            this.peer.on('error', (err) => {
                console.error(err);
                this.updateStatus("Ошибка сети: " + err.type, "disconnected");
            });
        }

        hostGame() {
            if (!this.peer || !this.peer.id) {
                this.updateStatus("Инициализация сети...", "waiting");
                setTimeout(() => this.hostGame(), 500);
                return;
            }
            document.getElementById('hostInfo').style.display = 'block';
            document.getElementById('joinInput').style.display = 'none';
            document.getElementById('myPeerId').innerText = this.peer.id;
            this.updateStatus("Ожидание подключения игрока...", "waiting");
            this.isHost = true;
        }

        joinGame() {
            document.getElementById('hostInfo').style.display = 'none';
            document.getElementById('joinInput').style.display = 'block';
            this.updateStatus("", "");
        }

        connectToPeer() {
            const remoteId = document.getElementById('remotePeerId').value.trim();
            if (!remoteId) return;
            this.updateStatus("Подключение...", "waiting");
            const conn = this.peer.connect(remoteId);

            conn.on('open', () => {
                this.conn = conn;
                this.setupConnection();
                this.isHost = false;
                this.myColor = 'black';
                this.updateStatus("Подключено! Ожидание начала игры...", "connected");
                this.conn.send({type: 'ready'});
            });

            conn.on('error', (err) => {
                console.error('Connection error:', err);
                this.updateStatus("Не удалось подключиться", "disconnected");
            });
        }

        setupConnection() {
            this.conn.on('data', (data) => {
                this.handleData(data);
            });

            this.conn.on('close', () => {
                this.updateStatus("Соперник отключился", "disconnected");
                this.conn = null;
                this.game.isProcessing = true;
                this.gameStarted = false;
            });
        }

        handleData(data) {
            if (data.type === 'move') {
                this.game.receiveMove(data.move);
            } else if (data.type === 'restart') {
                this.game.reset();
            } else if (data.type === 'ready' && !this.isHost) {
                this.game.startOnlineGame('black');
                this.gameStarted = true;
            }
        }

        sendMove(move) {
            if (this.conn && this.conn.open && this.conn.peerConnection) {
                this.conn.send({type: 'move', move: move});
            } else {
                console.warn('Cannot send move: connection not open');
                this.updateStatus("Соединение потеряно", "disconnected");
            }
        }

        disconnect() {
            if (this.conn) this.conn.close();
            if (this.peer) this.peer.destroy();
            this.conn = null;
            this.peer = null;
            this.gameStarted = false;
            document.getElementById('networkPanel').style.display = 'none';
            this.game.wrapper.classList.remove('mode-online');
        }

        updateStatus(msg, type) {
            const el = document.getElementById('connectionStatus');
            el.innerText = msg;
            el.className = 'connection-status status-' + type;
        }
    }

    // --- ЛОГИКА ИГРЫ ---
    class CheckersGame {
        constructor() {
            this.boardEl = document.getElementById('board');
            this.statusText = document.getElementById('statusText');
            this.turnDot = document.getElementById('turnDot');
            this.scoreWEl = document.getElementById('scoreW');
            this.scoreBEl = document.getElementById('scoreB');
            this.modal = document.getElementById('modalOverlay');
            this.modeSelect = document.getElementById('gameMode');
            this.playTypeSelect = document.getElementById('playType');
            this.title = document.getElementById('gameTitle');
            this.wrapper = document.getElementById('gameWrapper');
            this.mode = 'russian';
            this.playType = 'pve';
            this.board = [];
            this.turn = CONSTANTS.WHITE;
            this.selectedPos = null;
            this.validMoves = [];
            this.isProcessing = false;
            this.isGameOver = false;
            this.botCurrentPiecePos = null;
            this.myColorOnline = null;
            this.network = new NetworkManager(this);
            this.network.init();
            this.init();
        }

        setPlayType(type) {
            this.playType = type;
            this.wrapper.className = 'game-wrapper';
            if (type === 'pvp') this.wrapper.classList.add('mode-pvp');
            if (type === 'online') {
                this.wrapper.classList.add('mode-online');
                document.getElementById('networkPanel').style.display = 'block';
            } else {
                document.getElementById('networkPanel').style.display = 'none';
                this.network.disconnect();
            }
            this.reset();
        }

        startOnlineGame(color) {
            this.myColorOnline = color;
            this.reset();
            this.isProcessing = false;
        }

        init() {
            this.mode = this.modeSelect.value;
            this.title.innerText = this.mode === 'russian' ? "Русские Шашки" : "Турецкие Шашки";
            this.createBoardArray();
            this.render();
            this.updateUI();
            this.modal.style.display = 'none';
            this.isProcessing = false;
            this.isGameOver = false;
            this.botCurrentPiecePos = null;
            this.selectedPos = null;
            this.validMoves = [];
            this.turn = CONSTANTS.WHITE;
            this.updateStatus("Ход Белых");
        }

        createBoardArray() {
            this.board = Array(8).fill(null).map(() => Array(8).fill(CONSTANTS.EMPTY));
            if (this.mode === 'russian') {
                for (let r = 0; r < 8; r++) {
                    for (let c = 0; c < 8; c++) {
                        if ((r + c) % 2 !== 0) {
                            if (r < 3) this.board[r][c] = CONSTANTS.BLACK;
                            if (r > 4) this.board[r][c] = CONSTANTS.WHITE;
                        }
                    }
                }
            } else {
                for (let r = 0; r < 8; r++) {
                    for (let c = 0; c < 8; c++) {
                        if (r === 1 || r === 2) this.board[r][c] = CONSTANTS.BLACK;
                        else if (r === 5 || r === 6) this.board[r][c] = CONSTANTS.WHITE;
                    }
                }
            }
        }

        reset() {
            if (this.playType === 'online' && this.network.conn && this.network.conn.open) {
                this.network.conn.send({type: 'restart'});
                setTimeout(() => {
                    this.init();
                    this.isProcessing = false;
                }, 100);
            } else {
                this.init();
            }
        }

        getPieceColor(piece) {
            if (piece === CONSTANTS.WHITE || piece === CONSTANTS.WHITE_KING) return CONSTANTS.WHITE;
            if (piece === CONSTANTS.BLACK || piece === CONSTANTS.BLACK_KING) return CONSTANTS.BLACK;
            return 0;
        }

        isValid(r, c) {
            return r >= 0 && r < 8 && c >= 0 && c < 8;
        }

        getAllMoves(boardState, player) {
            let moves = [];
            let canCapture = false;
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = boardState[r][c];
                    if (piece !== CONSTANTS.EMPTY && this.getPieceColor(piece) === player) {
                        const pieceMoves = this.getMovesForPiece(boardState, r, c, piece);
                        pieceMoves.forEach(m => {
                            if (m.isCapture) canCapture = true;
                            moves.push(m);
                        });
                    }
                }
            }
            if (canCapture) return moves.filter(m => m.isCapture);
            return moves;
        }

        getMovesForPiece(boardState, r, c, piece) {
            const moves = [];
            const isKing = (piece === CONSTANTS.WHITE_KING || piece === CONSTANTS.BLACK_KING);
            const color = this.getPieceColor(piece);
            if (this.mode === 'russian') {
                const directions = [[-1, -1], [-1, 1], [1, -1], [1, 1]];
                directions.forEach(d => {
                    const [dr, dc] = d;
                    if (isKing) {
                        let dist = 1, foundEnemy = false, enemyPos = null;
                        while (true) {
                            const nr = r + dr * dist, nc = c + dc * dist;
                            if (!this.isValid(nr, nc)) break;
                            const cellContent = boardState[nr][nc];
                            if (cellContent === CONSTANTS.EMPTY) {
                                if (!foundEnemy) moves.push({
                                    from: {r, c},
                                    to: {r: nr, c: nc},
                                    isCapture: false
                                });
                                else moves.push({
                                    from: {r, c},
                                    to: {r: nr, c: nc},
                                    isCapture: true,
                                    captured: enemyPos
                                });
                            } else {
                                if (this.getPieceColor(cellContent) !== color) {
                                    if (!foundEnemy) {
                                        foundEnemy = true;
                                        enemyPos = {r: nr, c: nc};
                                    } else break;
                                } else break;
                            }
                            dist++;
                        }
                    } else {
                        const isForward = (color === CONSTANTS.WHITE && dr === -1) || (color === CONSTANTS.BLACK && dr === 1);
                        if (isForward) {
                            const nr = r + dr, nc = c + dc;
                            if (this.isValid(nr, nc) && boardState[nr][nc] === CONSTANTS.EMPTY) {
                                moves.push({
                                    from: {r, c},
                                    to: {r: nr, c: nc},
                                    isCapture: false
                                });
                            }
                        }
                        const jumpR = r + dr * 2, jumpC = c + dc * 2, midR = r + dr, midC = c + dc;
                        if (this.isValid(jumpR, jumpC)) {
                            const midPiece = boardState[midR][midC];
                            const targetCell = boardState[jumpR][jumpC];
                            if (midPiece !== CONSTANTS.EMPTY && targetCell === CONSTANTS.EMPTY && this.getPieceColor(midPiece) !== color) {
                                moves.push({
                                    from: {r, c},
                                    to: {r: jumpR, c: jumpC},
                                    isCapture: true,
                                    captured: {r: midR, c: midC}
                                });
                            }
                        }
                    }
                });
            } else {
                const straightDirections = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                if (isKing) {
                    straightDirections.forEach(d => {
                        const [dr, dc] = d;
                        let dist = 1, foundEnemy = false, enemyPos = null;
                        while (true) {
                            const nr = r + dr * dist, nc = c + dc * dist;
                            if (!this.isValid(nr, nc)) break;
                            const cellContent = boardState[nr][nc];
                            if (cellContent === CONSTANTS.EMPTY) {
                                if (!foundEnemy) moves.push({
                                    from: {r, c},
                                    to: {r: nr, c: nc},
                                    isCapture: false
                                });
                                else moves.push({
                                    from: {r, c},
                                    to: {r: nr, c: nc},
                                    isCapture: true,
                                    captured: enemyPos
                                });
                            } else {
                                if (this.getPieceColor(cellContent) !== color) {
                                    if (!foundEnemy) {
                                        foundEnemy = true;
                                        enemyPos = {r: nr, c: nc};
                                    } else break;
                                } else break;
                            }
                            dist++;
                        }
                    });
                } else {
                    straightDirections.forEach(d => {
                        const [dr, dc] = d;
                        const nr = r + dr, nc = c + dc;
                        if (this.isValid(nr, nc) && boardState[nr][nc] === CONSTANTS.EMPTY) {
                            moves.push({
                                from: {r, c},
                                to: {r: nr, c: nc},
                                isCapture: false
                            });
                        }
                        const isForward = (color === CONSTANTS.WHITE && dr === -1) || (color === CONSTANTS.BLACK && dr === 1);
                        const isSideways = (dr === 0);
                        if (isForward || isSideways) {
                            const jumpR = r + dr * 2, jumpC = c + dc * 2, midR = r + dr, midC = c + dc;
                            if (this.isValid(jumpR, jumpC)) {
                                const midPiece = boardState[midR][midC];
                                const targetCell = boardState[jumpR][jumpC];
                                if (midPiece !== CONSTANTS.EMPTY && targetCell === CONSTANTS.EMPTY && this.getPieceColor(midPiece) !== color) {
                                    moves.push({
                                        from: {r, c},
                                        to: {r: jumpR, c: jumpC},
                                        isCapture: true,
                                        captured: {r: midR, c: midC}
                                    });
                                }
                            }
                        }
                    });
                }
            }
            return moves;
        }

        handleCellClick(r, c) {
            if (this.isProcessing || this.isGameOver) return;

            if (this.playType === 'online') {
                if ((this.turn === CONSTANTS.WHITE && this.myColorOnline !== 'white') ||
                    (this.turn === CONSTANTS.BLACK && this.myColorOnline !== 'black')) {
                    return;
                }
            } else if (this.playType === 'pve' && this.turn === CONSTANTS.BLACK) {
                return;
            }

            const clickedPiece = this.board[r][c];
            const pieceColor = clickedPiece !== CONSTANTS.EMPTY ? this.getPieceColor(clickedPiece) : null;

            if (pieceColor !== this.turn && pieceColor !== null) return;

            const isOwnPiece = clickedPiece !== CONSTANTS.EMPTY && pieceColor === this.turn;

            if (isOwnPiece) {
                const allMoves = this.getAllMoves(this.board, this.turn);
                const hasCaptureGlobal = allMoves.some(m => m.isCapture);
                if (hasCaptureGlobal) {
                    const movesForThis = this.getMovesForPiece(this.board, r, c, clickedPiece);
                    if (!movesForThis.some(m => m.isCapture)) return;
                }
                this.selectedPos = {r, c};
                let moves = this.getMovesForPiece(this.board, r, c, clickedPiece);
                if (hasCaptureGlobal) moves = moves.filter(m => m.isCapture);
                this.validMoves = moves;
                this.render();
                return;
            }

            if (clickedPiece === CONSTANTS.EMPTY && this.selectedPos) {
                const move = this.validMoves.find(m => m.to.r === r && m.to.c === c);
                if (move) {
                    this.executeMove(move);
                }
            }
        }

        executeMove(move, isRemote = false) {
            const piece = this.board[move.from.r][move.from.c];
            this.board[move.to.r][move.to.c] = piece;
            this.board[move.from.r][move.from.c] = CONSTANTS.EMPTY;

            if (move.isCapture) {
                this.board[move.captured.r][move.captured.c] = CONSTANTS.EMPTY;
            }

            let promoted = false;
            if (piece === CONSTANTS.WHITE && move.to.r === 0) {
                this.board[move.to.r][move.to.c] = CONSTANTS.WHITE_KING;
                promoted = true;
            } else if (piece === CONSTANTS.BLACK && move.to.r === 7) {
                this.board[move.to.r][move.to.c] = CONSTANTS.BLACK_KING;
                promoted = true;
            }

            if (!isRemote && this.playType === 'online') {
                this.network.sendMove(move);
            }

            if (move.isCapture && !promoted) {
                const followUpMoves = this.getMovesForPiece(this.board, move.to.r, move.to.c, this.board[move.to.r][move.to.c])
                    .filter(m => m.isCapture);
                if (followUpMoves.length > 0) {
                    this.selectedPos = {r: move.to.r, c: move.to.c};
                    this.validMoves = followUpMoves;
                    this.render();
                    return;
                }
            }

            this.selectedPos = null;
            this.validMoves = [];
            this.switchTurn();
        }

        receiveMove(move) {
            this.executeMove(move, true);
        }

        switchTurn() {
            this.turn = (this.turn === CONSTANTS.WHITE) ? CONSTANTS.BLACK : CONSTANTS.WHITE;
            this.render();
            this.checkWinCondition();
            if (this.isGameOver) return;

            if (this.turn === CONSTANTS.BLACK) {
                if (this.playType === 'pve') {
                    this.isProcessing = true;
                    this.updateStatus("Ход бота...");
                    setTimeout(() => this.botTurn(), 500);
                } else {
                    this.isProcessing = false;
                    this.updateStatus("Ход Черных");
                }
            } else {
                this.isProcessing = false;
                this.updateStatus("Ход Белых");
            }
        }

        checkWinCondition() {
            const whiteMoves = this.getAllMoves(this.board, CONSTANTS.WHITE);
            const blackMoves = this.getAllMoves(this.board, CONSTANTS.BLACK);
            let whiteCount = 0, blackCount = 0;

            this.board.forEach(row => row.forEach(p => {
                if (this.getPieceColor(p) === CONSTANTS.WHITE) whiteCount++;
                if (this.getPieceColor(p) === CONSTANTS.BLACK) blackCount++;
            }));

            this.scoreWEl.innerText = whiteCount;
            this.scoreBEl.innerText = blackCount;

            if (blackCount === 0 || (this.turn === CONSTANTS.BLACK && blackMoves.length === 0)) {
                this.endGame(true);
            } else if (whiteCount === 0 || (this.turn === CONSTANTS.WHITE && whiteMoves.length === 0)) {
                this.endGame(false);
            }
        }

        endGame(whiteWon) {
            this.isGameOver = true;
            this.isProcessing = true;
            let msg = "";

            if (this.playType === 'online') {
                const iWon = (whiteWon && this.myColorOnline === 'white') || (!whiteWon && this.myColorOnline === 'black');
                msg = iWon ? "Вы победили!" : "Вы проиграли!";
                document.getElementById('modalTitle').innerText = iWon ? "Победа!" : "Поражение";
            } else if (this.playType === 'pvp') {
                msg = whiteWon ? "Белые победили!" : "Черные победили!";
                document.getElementById('modalTitle').innerText = whiteWon ? "Победа!" : "Поражение";
            } else {
                msg = whiteWon ? "Вы победили!" : "Бот победил!";
                document.getElementById('modalTitle').innerText = whiteWon ? "Победа!" : "Поражение";
            }

            document.getElementById('modalTitle').style.color = whiteWon ? "#27ae60" : "#c0392b";
            document.getElementById('modalMsg').innerText = msg;
            this.modal.style.display = 'flex';
        }

        updateStatus(msg) {
            if (msg) {
                this.statusText.innerText = msg;
                if (msg.includes("Белых")) {
                    this.turnDot.style.background = "white";
                    this.turnDot.style.border = "1px solid #ccc";
                } else {
                    this.turnDot.style.background = "black";
                    this.turnDot.style.border = "1px solid #555";
                }
                return;
            }

            if (this.turn === CONSTANTS.WHITE) {
                this.statusText.innerText = "Ход Белых";
                this.turnDot.style.background = "white";
                this.turnDot.style.border = "1px solid #ccc";
            } else {
                this.statusText.innerText = "Ход Черных";
                this.turnDot.style.background = "black";
                this.turnDot.style.border = "1px solid #555";
            }
        }

        updateUI() {
            const startCount = this.mode === 'russian' ? 12 : 16;
            this.scoreWEl.innerText = startCount;
            this.scoreBEl.innerText = startCount;
        }

        render() {
            this.boardEl.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
                    const isHighlight = this.validMoves.some(m => m.to.r === r && m.to.c === c);

                    if (isHighlight) {
                        cell.classList.add('highlight');
                        if (this.selectedPos) {
                            const dist = Math.abs(this.selectedPos.r - r) + Math.abs(this.selectedPos.c - c);
                            if (dist > 2) cell.classList.add('king-move');
                        }
                    }

                    cell.onclick = () => this.handleCellClick(r, c);

                    const pieceVal = this.board[r][c];
                    if (pieceVal !== CONSTANTS.EMPTY) {
                        const piece = document.createElement('div');
                        piece.className = 'piece';
                        if (this.getPieceColor(pieceVal) === CONSTANTS.WHITE) piece.classList.add('white');
                        else piece.classList.add('black');

                        if (pieceVal === CONSTANTS.WHITE_KING || pieceVal === CONSTANTS.BLACK_KING) {
                            piece.classList.add('king');
                        }

                        if (this.selectedPos && this.selectedPos.r === r && this.selectedPos.c === c) {
                            piece.classList.add('selected');
                        }
                        cell.appendChild(piece);
                    }
                    this.boardEl.appendChild(cell);
                }
            }
        }

        // --- BOT LOGIC ---
        botTurn() {
            if (this.isGameOver) return;

            const difficulty = document.getElementById('difficulty').value;
            const moves = this.getAllMoves(this.board, CONSTANTS.BLACK);

            if (moves.length === 0) {
                this.switchTurn();
                return;
            }

            let chosenMove;

            if (difficulty === 'easy') {
                chosenMove = moves[Math.floor(Math.random() * moves.length)];
            } else if (difficulty === 'medium') {
                const captures = moves.filter(m => m.isCapture);
                if (captures.length > 0) {
                    chosenMove = captures[Math.floor(Math.random() * captures.length)];
                } else {
                    chosenMove = moves[Math.floor(Math.random() * moves.length)];
                }
            } else { // hard
                chosenMove = this.getBestMoveHeuristic(moves);
            }

            if (chosenMove) {
                this.executeBotMove(chosenMove);
            }
        }

        getBestMoveHeuristic(moves) {
            let bestMove = moves[0];
            let bestScore = -Infinity;

            for (const move of moves) {
                let score = 0;

                // Бонус за взятие
                if (move.isCapture) {
                    score += 10;

                    // Дополнительный бонус за взятие дамкой
                    const piece = this.board[move.from.r][move.from.c];
                    const isKing = (piece === CONSTANTS.BLACK_KING);
                    if (isKing) score += 5;
                }

                // Бонус за продвижение в дамки
                if (move.to.r === 7 && this.board[move.from.r][move.from.c] === CONSTANTS.BLACK) {
                    score += 8;
                }

                // Бонус за движение к центру
                const centerDist = Math.abs(move.to.c - 3.5);
                score += (4 - centerDist) * 0.5;

                if (score > bestScore) {
                    bestScore = score;
                    bestMove = move;
                }
            }

            return bestMove;
        }

        executeBotMove(move) {
            const piece = this.board[move.from.r][move.from.c];
            this.board[move.to.r][move.to.c] = piece;
            this.board[move.from.r][move.from.c] = CONSTANTS.EMPTY;

            if (move.isCapture) {
                this.board[move.captured.r][move.captured.c] = CONSTANTS.EMPTY;
            }

            let promoted = false;
            if (piece === CONSTANTS.BLACK && move.to.r === 7) {
                this.board[move.to.r][move.to.c] = CONSTANTS.BLACK_KING;
                promoted = true;
            }

            if (move.isCapture && !promoted) {
                const followUpMoves = this.getMovesForPiece(this.board, move.to.r, move.to.c, this.board[move.to.r][move.to.c])
                    .filter(m => m.isCapture);
                if (followUpMoves.length > 0) {
                    this.botCurrentPiecePos = {r: move.to.r, c: move.to.c};
                    this.render();
                    setTimeout(() => this.botTurn(), 600);
                    return;
                }
            }

            this.botCurrentPiecePos = null;
            this.selectedPos = null;
            this.validMoves = [];
            this.switchTurn();
        }
    }

    const game = new CheckersGame();
    const network = game.network;
</script>
